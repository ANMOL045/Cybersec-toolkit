<!DOCTYPE html>
<html>
<head>
    <title>Password Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

    <div class="max-w-xl mx-auto mt-20">

        <a href="/" class="text-gray-400 hover:text-white block mb-4">⬅ Back</a>

        <h2 class="text-3xl font-bold text-blue-400 mb-6">
            Password Strength Checker
        </h2>

        <form method="POST" class="flex gap-2">
            <input type="text" name="password" placeholder="Enter password"
                class="flex-1 p-3 rounded bg-gray-800 border border-gray-700 focus:outline-none">
            
            <button class="bg-blue-500 px-6 rounded hover:bg-blue-600">
                Check
            </button>
        </form>

        {% if result is not none %}
            <div class="mt-6 bg-gray-800 p-4 rounded">
                <h3 class="text-lg">
                    Strength Score: {{ result }}/5
                </h3>

                <p class="mt-2 text-blue-300">Level: {{ strength }}</p>
                <p class="text-gray-300">Estimated Entropy: {{ entropy }} bits</p>

                {% if feedback %}
                    <ul class="mt-3 list-disc ml-5 text-gray-300 space-y-1">
                        {% for item in feedback %}
                            <li>{{ item }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            </div>
        {% endif %}

    </div>

</body>
</html>
