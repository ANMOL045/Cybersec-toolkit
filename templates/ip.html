<!DOCTYPE html>
<html>
<head>
    <title>IP Lookup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

<div class="max-w-xl mx-auto mt-20">

    <a href="/" class="text-gray-400 mb-4 block">⬅ Back</a>

    <h2 class="text-3xl mb-6 text-purple-400">
        IP Information Lookup
    </h2>

    <form method="POST" class="flex gap-2">
        <input type="text" name="ip" placeholder="Enter public IP address (e.g., 8.8.8.8)"
            class="flex-1 p-3 bg-gray-800 rounded border border-gray-700">
        
        <button class="bg-purple-500 px-6 rounded hover:bg-purple-600">
            Search
        </button>
    </form>

    {% if data %}
        <div class="mt-6 bg-gray-800 p-4 rounded">
            
            {% if data.error %}
                <p class="text-red-400">Error: {{ data.error }}</p>
            {% else %}
                <p><strong>IP:</strong> {{ data.query }}</p>
                <p><strong>Country:</strong> {{ data.country }}</p>
                <p><strong>City:</strong> {{ data.city }}</p>
                <p><strong>ISP:</strong> {{ data.isp }}</p>
            {% endif %}

        </div>
    {% endif %}

</div>

</body>
</html>
